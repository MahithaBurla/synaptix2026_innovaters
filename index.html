<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEARONA - Adaptive Programming Assessment</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🎓 LEARONA</h1>
    <p>Adaptive Programming Assessment</p>
    <input id="username" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <h2>LEARONA</h2>
    <ul>
      <li onclick="showPage('home')">🏠 Home</li>
      <li onclick="showPage('dashboard')">📊 Dashboard</li>
      <li onclick="showPage('assessment')">🧠 Assessment</li>
      <li onclick="showPage('profile')">👤 Profile</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <div class="content" id="content">
    <div class="card">
      <h2>Welcome to LEARONA 🎉</h2>
      <p>Smart Adaptive Programming Quiz System</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
